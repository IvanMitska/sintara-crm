# E2E: вход в приложение (ТЗ §18). Переиспользуется другими сценариями
# через `runFlow: login.yaml`.
appId: com.sintara.crm.mobile
env:
  EMAIL: manager@sintara.crm
  PASSWORD: password123
---
- launchApp:
    clearState: true
- assertVisible: 'С возвращением'
- tapOn:
    id: 'auth-email'
- inputText: ${EMAIL}
- tapOn:
    id: 'auth-password'
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    id: 'auth-submit'
- assertVisible: 'Сегодня'
